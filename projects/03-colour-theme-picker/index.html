<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Colour Theme Picker</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Colour Theme Picker</h1>
    <p>Use a dropdown to change the look of the page.</p>
  </header>
  <main>
<section class="card">
  <h2>Colour Theme Picker</h2>
  <label for="themeSelect">Choose theme</label>
  <select id="themeSelect">
    <option value="default">Default</option>
    <option value="calm">Calm</option>
    <option value="sharp">Sharp</option>
    <option value="dark">Dark</option>
  </select>
  <p id="themeMessage">Change the dropdown and update the theme.</p>
</section>
  </main>
</body>
</html>
