<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Dashboard Capstone</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Mini Dashboard Capstone</h1>
    <p>Build a small personal study dashboard with tasks, notes, and progress cards.</p>
  </header>
  <main>
<section class="card">
  <h2>Mini Dashboard Capstone</h2>
  <div class="grid two">
    <form id="taskForm">
      <h3>Add study task</h3>
      <input id="taskInput" type="text" placeholder="Example: revise DOM events" />
      <select id="categorySelect">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="project">Project</option>
      </select>
      <button type="submit">Add task</button>
    </form>

    <div>
      <h3>Progress</h3>
      <p id="summaryText" class="result">No tasks yet.</p>
      <button id="clearBtn" class="danger">Clear dashboard</button>
    </div>
  </div>

  <label for="filterSelect">Filter</label>
  <select id="filterSelect">
    <option value="all">All</option>
    <option value="html">HTML</option>
    <option value="css">CSS</option>
    <option value="javascript">JavaScript</option>
    <option value="project">Project</option>
  </select>

  <ul id="taskList" class="todo-list"></ul>
</section>
  </main>
</body>
</html>
