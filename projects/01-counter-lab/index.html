<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter Lab</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />

<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Counter Lab</h1>
    <p>Build a counter with +1, -1, +5, reset, and a simple limit warning.</p>
  </header>
  <main>
<section class="card counter-card">
  <h2>Counter Lab</h2>
  <p class="big-number" id="countDisplay">0</p>
  <p id="statusText">Counter is ready.</p>

  <div class="button-row">
    <button id="minusBtn">-1</button>
    <button id="plusBtn">+1</button>
    <button id="plusFiveBtn">+5</button>
    <button id="resetBtn" class="secondary">Reset</button>
  </div>
</section>
  </main>
