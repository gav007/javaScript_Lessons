<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modal Tabs Accordion</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Modal Tabs Accordion</h1>
    <p>Build three common UI patterns: modal, tabs, and accordion.</p>
  </header>
  <main>
<section class="card">
  <h2>Modal, Tabs, Accordion</h2>

  <button id="openModalBtn">Open modal</button>
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Modal title</h3>
      <p>This panel should close when you press the close button.</p>
      <button id="closeModalBtn">Close</button>
    </div>
  </div>

  <hr />

  <div class="tabs">
    <button class="tab-btn active" data-tab="html">HTML</button>
    <button class="tab-btn" data-tab="css">CSS</button>
    <button class="tab-btn" data-tab="js">JS</button>
  </div>
  <p id="tabContent" class="result">HTML gives the page structure.</p>

  <hr />

  <button class="accordion-btn">What is the DOM?</button>
  <p class="accordion-panel hidden">The live document object that JavaScript can read and change.</p>
</section>
  </main>
</body>
</html>
