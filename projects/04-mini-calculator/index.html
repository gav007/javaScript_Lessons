<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Calculator</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Mini Calculator</h1>
    <p>Build a calculator with add, subtract, multiply, and divide.</p>
  </header>
  <main>
<section class="card">
  <h2>Mini Calculator</h2>
  <div class="grid two">
    <label>First number <input id="firstNumber" type="number" placeholder="10" /></label>
    <label>Second number <input id="secondNumber" type="number" placeholder="5" /></label>
  </div>
  <div class="button-row">
    <button data-operation="add">Add</button>
    <button data-operation="subtract">Subtract</button>
    <button data-operation="multiply">Multiply</button>
    <button data-operation="divide">Divide</button>
  </div>
  <p id="result" class="result">Result will appear here.</p>
</section>
  </main>
</body>
</html>
