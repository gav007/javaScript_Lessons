<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo Local Storage</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Todo Local Storage</h1>
    <p>Upgrade the todo list so tasks survive page refresh.</p>
  </header>
  <main>
<section class="card">
  <h2>Todo Local Storage</h2>
  <form id="todoForm" class="inline-form">
    <input id="todoInput" type="text" placeholder="Add a persistent task..." />
    <button type="submit">Add</button>
  </form>
  <ul id="todoList" class="todo-list"></ul>
  <button id="clearBtn" class="danger">Clear saved tasks</button>
</section>
  </main>
</body>
</html>
