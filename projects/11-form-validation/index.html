<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Validation</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Form Validation</h1>
    <p>Validate a contact form before allowing a fake submit.</p>
  </header>
  <main>
<section class="card">
  <h2>Form Validation</h2>
  <form id="contactForm" novalidate>
    <label>Name <input id="nameInput" type="text" /></label>
    <small id="nameError" class="error"></small>

    <label>Email <input id="emailInput" type="email" /></label>
    <small id="emailError" class="error"></small>

    <label>Message <textarea id="messageInput" rows="5"></textarea></label>
    <small id="messageError" class="error"></small>

    <button type="submit">Send</button>
  </form>
  <p id="successMessage" class="result"></p>
</section>
  </main>
</body>
</html>
