<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Button Lab</title>
    <link rel="stylesheet" href="../../shared/global.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <p><a href="../../index.html">← Back to project list</a></p>
      <h1>Button Lab</h1>
      <p>Make buttons change text, count clicks, toggle a panel, and reset the page.</p>
    </header>
    <main>
      <section class="card">
        <h2>Button Lab</h2>
        <p id="message">Press a button and make JavaScript change me.</p>

        <!--MAIN AREA-->
        <div class="button-row">
          <button id="helloBtn">Say hello</button>
          <button id="countBtn">Count clicks</button>
          <button id="toggleBtn">Toggle hint box</button>
          <button id="resetBtn" class="secondary">Reset</button>
        </div>

        <div id="hintBox" class="notice hidden">
          This box should appear and disappear when the toggle button is clicked.
        </div>
      </section>
    </main>
  </body>
</html>
