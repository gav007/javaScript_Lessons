<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text To Speech</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Text To Speech</h1>
    <p>Convert typed text into speech, with voice, pitch, and rate controls.</p>
  </header>
  <main>
<section class="card">
  <h2>Text To Speech</h2>
  <label for="textInput">Text to speak</label>
  <textarea id="textInput" rows="5" placeholder="Type something..."></textarea>

  <label for="voiceSelect">Voice</label>
  <select id="voiceSelect"></select>

  <div class="grid two">
    <label>Rate <input id="rateInput" type="range" min="0.5" max="2" step="0.1" value="1" /></label>
    <label>Pitch <input id="pitchInput" type="range" min="0" max="2" step="0.1" value="1" /></label>
  </div>

  <button id="speakBtn">Speak</button>
  <p id="statusText" class="result">Ready.</p>
</section>
  </main>
</body>
</html>
