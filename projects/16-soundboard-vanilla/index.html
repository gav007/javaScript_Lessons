<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Soundboard Vanilla</title>
  <link rel="stylesheet" href="../../shared/global.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <p><a href="../../index.html">← Back to project list</a></p>
    <h1>Soundboard Vanilla</h1>
    <p>Build a simple soundboard using plain JavaScript before touching p5.js.</p>
  </header>
  <main>
<section class="card">
  <h2>Soundboard Vanilla</h2>
  <p>Press buttons or keyboard keys A, S, D.</p>
  <div class="button-row">
    <button data-sound="click" data-key="a">A - Click</button>
    <button data-sound="pop" data-key="s">S - Pop</button>
    <button data-sound="beep" data-key="d">D - Beep</button>
  </div>
  <p id="statusText" class="result">Ready.</p>
</section>
  </main>
</body>
</html>
